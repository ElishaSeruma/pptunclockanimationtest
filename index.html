<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Character Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- phase 1: dashboard — select a character -->
      <section id="idle" class="phase dashboard">
        <header class="dash-header">
          <div>
            <h1 class="dash-title">Character Vault</h1>
            <p class="dash-sub">Select a character to run their unlock sequence</p>
          </div>
          <span id="dashCount" class="dash-count">0/12 UNLOCKED</span>
        </header>
        <div id="dashGrid" class="dash-grid"></div>
      </section>

      <!-- phase 2: shader lines reveal + persona phrase -->
      <section id="reveal" class="phase" hidden>
        <canvas id="shaderCanvas"></canvas>
        <div class="reveal-overlay">
          <span id="phrase" class="phrase"></span>
          <span id="unlockedTag" class="unlocked-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
            Character Unlocked
          </span>
        </div>
      </section>

      <!-- phase 3: card + ambient background (marquee, washes, burst) -->
      <section id="cardPhase" class="phase" hidden>
        <div id="hero" class="hero-section">
          <div class="accent-wash"></div>
          <div class="animated-hue"></div>
          <div class="room-wall"></div>
          <div class="room-floor"></div>

          <!-- scaled stage: scrolling name marquee cubes -->
          <div class="content" id="heroContent">
            <div class="container-full">
              <div class="cube-stage" id="cubeMain"></div>
              <div class="cube-stage container-reflect" id="cubeReflect"></div>
            </div>
          </div>

          <!-- subtle energy burst + floating card (unscaled) -->
          <div class="card-slot">
            <div class="burst"></div>
            <div class="card-float">
              <div class="glare-card" id="glareCard">
                <div class="glare-card__inner">
                  <div class="glare-card__layer glare-card__content">
                    <img id="cardImage" alt="" draggable="false" />
                  </div>
                  <div class="glare-card__layer glare-card__glare"></div>
                  <div class="glare-card__layer glare-card__foil"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="big-name-wrap">
          <span id="bigName" class="big-name font-indiana"></span>
        </div>
      </section>

      <!-- character switcher pill (visible during reveal/card phases) -->
      <nav id="pill" class="pill" aria-label="Character switcher" hidden>
        <button id="randomBtn" class="pill-sparkle" aria-label="Random character">✨</button>
        <div class="pill-divider"></div>
        <div id="pillScroll" class="pill-scroll"></div>
      </nav>

      <!-- back to dashboard -->
      <button id="backBtn" class="back-btn" hidden>← Dashboard</button>

      <!-- sound toggle -->
      <button id="muteBtn" class="mute-btn" aria-label="Toggle sound">🔊</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
